inherit_gem:
  rubocop-rails-omakase: rubocop.yml

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - "bin/**/*"
    - "db/schema.rb"
    - "db/migrate/**/*"
    - "tmp/**/*"
    - "log/**/*"
    - "vendor/**/*"
    - "node_modules/**/*"
    - "config/locales/**/*"

Style/Documentation:
  Enabled: false
